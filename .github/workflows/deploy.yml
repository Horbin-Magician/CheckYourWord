name: Deploy static content to Pages

on:
  push:
    branches: ['main'] # 或者根据你的主分支是 master 进行修改

# 授予 GITHUB_TOKEN 所需的权限以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新排队之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # 单个部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 如果你使用的是 pnpm 或 yarn，这里需要修改
      - name: Install dependencies
        run: npm ci # 如果你使用的是 pnpm 则为: pnpm install / yarn 则为: yarn install
      - name: Build
        run: npm run build # 如果你使用了环境变量，这步运行的时候如果缺失环境可能需要单独配置环境变量 
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传 dist 目录
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4